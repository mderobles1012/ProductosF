name: Deploy Automático a AWS

on:
  push:
    branches:
      - main  # Cambia por 'master' si esa es tu rama principal en GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Conectarse a AWS y actualizar la App
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.AWS_HOST }}
        username: ${{ secrets.AWS_USER }}
        key: ${{ secrets.AWS_SSH_KEY }}
        port: 22
        script: |
          # 1. Entrar a la carpeta de tu proyecto en AWS
          # (REEMPLAZA /home/ubuntu/tu-proyecto por la ruta real en tu servidor)
          cd /home/ubuntu/ProductosF
          
          # 2. Bajar los cambios nuevos de GitHub
          git pull origin main
          
          # 3. Si hiciste cambios en React, descomenta las líneas de abajo para compilar:
          # npm install
          # npm run build
          
          # 4. Reiniciar el backend con Gunicorn de forma segura
          echo "Reiniciando servidor con Gunicorn..."
          
          # Busca si ya hay un proceso de gunicorn corriendo y lo detiene para evitar conflictos
          pkill -f "gunicorn" || true
          
          # Levanta Gunicorn en segundo plano (modo daemon) en el puerto 5000
          gunicorn --bind 0.0.0.0:5000 app:app --daemon
          
          echo "¡Despliegue completado con éxito!"